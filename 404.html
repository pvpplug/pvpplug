<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>ПВПЛУГ — страница не найдена</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #0d0d0d;
        color: #e8e8e6;
        font-family: 'Manrope', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 300;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px;
      }

      .code {
        font-size: 80px;
        font-weight: 200;
        color: #2a2a2a;
        line-height: 1;
        margin-bottom: 24px;
      }

      h1 {
        font-size: 18px;
        font-weight: 400;
        letter-spacing: 1px;
        margin-bottom: 12px;
      }

      p {
        font-size: 14px;
        color: #888;
        margin-bottom: 36px;
        max-width: 320px;
      }

      a {
        display: inline-block;
        padding: 12px 32px;
        border: 1px solid #2a2a2a;
        color: #c0c0c0;
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: border-color 0.2s, color 0.2s;
      }

      a:hover {
        border-color: #666;
        color: #e8e8e6;
      }
    </style>
  </head>
  <body>

    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Похоже, такой страницы не существует или она была удалена</p>
    <a href="index.html">На главную</a>

  </body>
</html>
